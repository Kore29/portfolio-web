services:
  portfolio-web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: portfolio-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env.prod
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NODE_ENV=production
