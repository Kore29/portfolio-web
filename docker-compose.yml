services:
  portfolio-web-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-web-dev
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NODE_ENV=development
